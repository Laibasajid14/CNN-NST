# Task 2 Configuration — Assignment 5
# Neural Style Transfer + Video Pipeline + Matting

matting:
  seed: 42
  img_size: 256
  batch_size: 16
  max_epochs: 20
  patience: 5
  lr: 0.001
  n_train: 5000
  n_val: 500
  n_test: 500

nst:
  img_size: 256
  n_steps: 150          # CPU-feasible (full quality = 500+)
  style_weight: 100000  # β — controls style strength
  content_weight: 1.0   # α

video:
  target_fps: 8         # Reduce from source FPS (5-10 recommended for CPU)
  frame_size: 256
  max_frames: 150       # Safety cap

paths:
  aisegment_root:   "./data"                       # AISegment dataset root (contains clip_img/ and matting/)
  matting_weights:  "./task2_outputs/matting_weights"
  matting_plots:    "./task2_outputs/matting_plots"
  task2_outputs:    "./task2_outputs"
